    <!-- ── LIKE BUTTON ── -->
    <section class="like-section" aria-label="좋아요">
        <div class="like-wrapper">
            <button class="like-btn" id="like-btn" aria-label="좋아요 누르기" title="하루에 한 번 누를 수 있어요">
                <span class="like-heart" id="like-heart">🤍</span>
                <span class="like-label" id="like-label">이 페이지가 마음에 드셨나요?</span>
            </button>
            <div class="like-count-wrap">
                <span class="like-count" id="like-count">0</span>
                <span class="like-count-label">명이 좋아해요</span>
            </div>
            <p class="like-hint" id="like-hint">하루에 한 번 누를 수 있어요 ✨</p>
        </div>
    </section>

    <!-- ── VISITOR COUNTER ── -->
    <section class="stats-section" aria-label="방문자 통계">
        <div class="stats-wrapper">
            <div class="stat-item">
                <span class="stat-icon">👤</span>
                <div class="stat-info">
                    <span class="stat-value" id="visit-today">—</span>
                    <span class="stat-label">오늘 방문자</span>
                </div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-icon">🌍</span>
                <div class="stat-info">
                    <span class="stat-value" id="visit-total">—</span>

    <!-- ── FOOTER ── -->
    <footer>
        <div class="footer-inner">
            <p class="footer-copy">© 2026 <strong>최재웅</strong> · nullpoint.cloud</p>
            <nav class="footer-links" aria-label="푸터 링크">
                <a href="https://github.com/ChoiJaeWoon" target="_blank" rel="noopener">GitHub</a>
            </nav>
        </div>
    </footer>

    <script>
        (function () {
            /* ── Canvas ── */
            var canvas = document.getElementById('intro-canvas');
            var ctx = canvas.getContext('2d');
            var W, H;
            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            var TOTAL = 90;
            var DOT_R = 3.0;
            var CLR = '#2563eb';
            var FILL_MS = 2800;
            var FADE_MS = 160;
            function getR() { return Math.min(W, H) * 0.17; }

            var dots = [];
            for (var i = 0; i < TOTAL; i++) {
                dots.push({
                    angle: -Math.PI / 2 + (i / TOTAL) * Math.PI * 2,
                    alpha: 0,
                });
            }

            var startTime = performance.now();
            var bursting = false;
            var burstDots = [];
            var rafId;

            function draw(ts) {
                ctx.clearRect(0, 0, W, H);
                var cx = W / 2, cy = H / 2, R = getR();

                if (!bursting) {
                    var elapsed = ts - startTime;
                    for (var i = 0; i < TOTAL; i++) {
                        var triggerAt = (i / TOTAL) * FILL_MS;
                        var sinceAppear = elapsed - triggerAt;
                        dots[i].alpha = Math.max(0, Math.min(1, sinceAppear / FADE_MS));
                        if (dots[i].alpha <= 0) continue;
                        var x = cx + Math.cos(dots[i].angle) * R;
                        var y = cy + Math.sin(dots[i].angle) * R;
                        ctx.beginPath();
                        ctx.arc(x, y, DOT_R, 0, Math.PI * 2);
                        ctx.fillStyle = CLR;
                        ctx.globalAlpha = dots[i].alpha * 0.8;
                        ctx.fill();
                    }
                } else {
                    var alive = false;
                    for (var j = 0; j < burstDots.length; j++) {
                        var p = burstDots[j];
                        p.x += p.vx; p.y += p.vy;
                        p.vx *= 1.07; p.vy *= 1.07;
                        p.alpha -= 0.034;
                        if (p.alpha > 0) {
                            alive = true;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                            ctx.fillStyle = p.color;
                            ctx.globalAlpha = p.alpha;
                            ctx.fill();
                        }
                    }
                    if (!alive) { cancelAnimationFrame(rafId); return; }
                }

                ctx.globalAlpha = 1;
                rafId = requestAnimationFrame(draw);
            }
            rafId = requestAnimationFrame(draw);

            function triggerBurst() {
                var cx = W / 2, cy = H / 2, R = getR();
                burstDots = [];
                for (var i = 0; i < TOTAL; i++) {
                    var speed = 4 + Math.random() * 5;
                    burstDots.push({
                        x: cx + Math.cos(dots[i].angle) * R,
                        y: cy + Math.sin(dots[i].angle) * R,
                        vx: Math.cos(dots[i].angle) * speed,
                        vy: Math.sin(dots[i].angle) * speed,
                        r: DOT_R, alpha: dots[i].alpha, color: CLR,
                    });
                }
                for (var k = 0; k < 20; k++) {
                    var a = Math.random() * Math.PI * 2;
                    var s = 3 + Math.random() * 7;
                    burstDots.push({
                        x: cx, y: cy,
                        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
                        r: 2 + Math.random() * 2, alpha: 0.8,
                        color: Math.random() > 0.5 ? CLR : '#7c3aed',
                    });
                }
                bursting = true;
            }

            var words = [
                '"Hello, World!"', '"Bonjour"', '"Ciao"',
                '"Olá"', '"Hola"', '"こんにちは"', '"안녕하세요"',
            ];
            var TOTAL_W = words.length;
            var el = document.getElementById('intro-word');
            var numEl = document.getElementById('intro-num');
            var overlay = document.getElementById('intro');
            var DISPLAY = 310;
            var FADE = 130;
            var idx = 1;

            document.body.style.overflow = 'hidden';

            function showNext() {
                if (idx >= TOTAL_W) {
                    el.classList.add('fade-out');
                    triggerBurst();
                    setTimeout(function () {
                        overlay.classList.add('hidden');
                        document.body.style.overflow = '';
                    }, 1100);
                    return;
                }
                el.classList.remove('fade-in');
                el.classList.add('fade-out');
                setTimeout(function () {
                    el.textContent = words[idx];
                    numEl.textContent =
                        String(idx + 1).padStart(2, '0') + ' / ' +
                        String(TOTAL_W).padStart(2, '0');
                    idx++;
                    el.classList.remove('fade-out');
                    el.classList.add('fade-in');
                    setTimeout(showNext, DISPLAY);
                }, FADE);
            }
            setTimeout(showNext, DISPLAY);
        })();
    </script>

    <script>
        /* ── LIKE BUTTON (Firebase Realtime Database) ── */
        (function () {
            var btn = document.getElementById('like-btn');
            var heart = document.getElementById('like-heart');
            var label = document.getElementById('like-label');
            var countEl = document.getElementById('like-count');
            var hint = document.getElementById('like-hint');

            var DATE_KEY = 'nullpoint_like_date';
            var DB_URL = 'https://hello-355b5-default-rtdb.firebaseio.com/nullpoint_likes.json';

            function getTodayStr() {
                var d = new Date();
                return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
            }

            function hasLikedToday() {
                return localStorage.getItem(DATE_KEY) === getTodayStr();
            }

            function setLikedState() {
                btn.classList.add('liked');
                heart.textContent = '❤️';
                label.textContent = '좋아요! 감사합니다 😊';
                hint.textContent = '내일 다시 누를 수 있어요';
                btn.disabled = true;
            }

            fetch(DB_URL)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    var count = (data && typeof data.count === 'number') ? data.count : 0;
                    countEl.textContent = count;
                })
                .catch(function () { countEl.textContent = '?'; });

            if (hasLikedToday()) setLikedState();

            btn.addEventListener('click', function () {
                if (hasLikedToday()) return;
                btn.disabled = true;
                fetch(DB_URL)
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        var newCount = ((data && typeof data.count === 'number') ? data.count : 0) + 1;
                        return fetch(DB_URL, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ count: newCount })
                        }).then(function () { return newCount; });
                    })
                    .then(function (newCount) {
                        localStorage.setItem(DATE_KEY, getTodayStr());
                        countEl.textContent = newCount;
                        heart.classList.add('pop');
                        setTimeout(function () { heart.classList.remove('pop'); }, 400);
                        spawnHearts(btn);
                        setLikedState();
                    })
                    .catch(function () {
                        btn.disabled = false;
                        hint.textContent = '오류가 발생했어요. 잠시 후 다시 시도해 주세요.';
                    });
            });

            function spawnHearts(origin) {
                var rect = origin.getBoundingClientRect();
                var cx = rect.left + rect.width / 2;
                var cy = rect.top + rect.height / 2;
                var emojis = ['❤️', '🧡', '💛', '💜', '💙'];
                for (var i = 0; i < 8; i++) {
                    (function (i) {
                        var span = document.createElement('span');
                        span.textContent = emojis[i % emojis.length];
                        span.style.cssText = [
                            'position:fixed', 'left:' + cx + 'px', 'top:' + cy + 'px',
                            'font-size:' + (14 + Math.random() * 10) + 'px',
                            'pointer-events:none', 'z-index:9999',
                            'transform:translate(-50%,-50%)', 'transition:none', 'user-select:none',
                        ].join(';');
                        document.body.appendChild(span);
                        var angle = (i / 8) * Math.PI * 2;
                        var dist = 60 + Math.random() * 50;
                        var tx = Math.cos(angle) * dist;
                        var ty = Math.sin(angle) * dist - 30;
                        requestAnimationFrame(function () {
                            span.style.transition = 'transform 0.7s ease-out, opacity 0.7s ease-out';
                            span.style.transform = 'translate(calc(-50% + ' + tx + 'px), calc(-50% + ' + ty + 'px))';
                            span.style.opacity = '0';
                        });
                        setTimeout(function () { document.body.removeChild(span); }, 800);
                    })(i);
                }
            }
        })();
    </script>

    <script>
        /* ── VISITOR COUNTER (Firebase Realtime Database) ── */
        (function () {
            var todayEl = document.getElementById('visit-today');
            var totalEl = document.getElementById('visit-total');

            var VISIT_KEY = 'nullpoint_visit_date';
            var BASE_URL = 'https://hello-355b5-default-rtdb.firebaseio.com/nullpoint_visits';

            function getTodayStr() {
                var d = new Date();
                return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
            }

            function hasVisitedToday() {
                return localStorage.getItem(VISIT_KEY) === getTodayStr();
            }

            function formatNum(n) { return n.toLocaleString(); }

            function loadCounts() {
                fetch(BASE_URL + '.json')
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        data = data || {};
                        var total = typeof data.total === 'number' ? data.total : 0;
                        var today = typeof data[getTodayStr()] === 'number' ? data[getTodayStr()] : 0;
                        totalEl.textContent = formatNum(total);
                        todayEl.textContent = formatNum(today);
                    })
                    .catch(function () { totalEl.textContent = '—'; todayEl.textContent = '—'; });
            }

            function recordVisit() {
                var todayStr = getTodayStr();
                fetch(BASE_URL + '.json')
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        data = data || {};
                        var newTotal = (typeof data.total === 'number' ? data.total : 0) + 1;
                        var newToday = (typeof data[todayStr] === 'number' ? data[todayStr] : 0) + 1;
                        data.total = newTotal;
                        data[todayStr] = newToday;
                        return fetch(BASE_URL + '.json', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        }).then(function () {
                            localStorage.setItem(VISIT_KEY, todayStr);
                            totalEl.textContent = formatNum(newTotal);
                            todayEl.textContent = formatNum(newToday);
                        });
                    })
                    .catch(function () { });
            }

            if (hasVisitedToday()) { loadCounts(); } else { recordVisit(); }
        })();
    </script>

</body>
